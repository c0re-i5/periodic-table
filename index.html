<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Periodic Table of the Elements</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ═══════════════════════ Header ═══════════════════════ -->
  <header class="app-header">
    <div class="header-content">
      <h1>Periodic Table <span class="header-subtitle">of the Elements</span></h1>
      <div class="header-controls">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search elements..." autocomplete="off" aria-label="Search elements">
        </div>
        <div class="temp-control">
          <label for="temp-slider" class="temp-label">
            <span class="temp-value" id="temp-display">25°C</span>
            <span class="temp-caption">Temperature</span>
          </label>
          <input type="range" id="temp-slider" min="-273" max="6000" value="25" step="1" aria-label="Temperature slider">
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════ Main Content ═══════════════════════ -->
  <main class="app-main">
    <!-- Category Legend -->
    <div class="legend" id="legend"></div>

    <!-- Periodic Table Grid -->
    <div class="table-container">
      <div class="periodic-table" id="periodic-table">
        <!-- Elements are rendered by JS -->
      </div>

      <!-- Lanthanide / Actinide separator -->
      <div class="f-block-separator">
        <div class="f-block-row lanthanide-row" id="lanthanide-row-label">
          <span class="f-block-label">Lanthanides</span>
        </div>
        <div class="f-block-row actinide-row" id="actinide-row-label">
          <span class="f-block-label">Actinides</span>
        </div>
      </div>
    </div>

    <!-- Element Detail Modal -->
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <aside class="detail-panel" id="detail-panel" aria-live="polite">
      <div class="detail-content" id="detail-content">
        <button class="detail-close" id="detail-close" aria-label="Close detail panel">&times;</button>
        <div class="detail-layout">
          <!-- Left Column: Identity & Chemistry -->
          <div class="detail-col-left">
            <div class="detail-header">
              <div class="detail-symbol-block" id="detail-symbol-block">
                <span class="detail-number" id="detail-number"></span>
                <span class="detail-symbol" id="detail-symbol"></span>
                <span class="detail-name" id="detail-name"></span>
                <span class="detail-mass" id="detail-mass"></span>
              </div>
              <div class="detail-category-badge" id="detail-category"></div>
            </div>
            <p class="detail-summary" id="detail-summary"></p>
            <div class="detail-fun-fact" id="detail-fun-fact">
              <span class="fun-fact-label">Fun Fact</span>
              <p id="detail-fun-fact-text"></p>
            </div>
            <div class="detail-ions" id="detail-ions" style="display:none">
              <h3>Ionic States &amp; Oxidation</h3>
              <div class="oxidation-states" id="oxidation-states"></div>
              <div class="ions-list" id="ions-list"></div>
            </div>
            <div class="detail-properties">
              <h3>Properties</h3>
              <div class="properties-grid" id="properties-grid"></div>
            </div>
          </div>
          <!-- Right Column: Visualizations -->
          <div class="detail-col-right">
            <div class="detail-shells">
              <h3>Electron Configuration</h3>
              <p class="electron-config-text" id="electron-config-text"></p>
              <div class="viz-switcher">
                <button class="viz-tab active" data-viz="bohr2d" title="2D Bohr Model">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 2"/><circle cx="12" cy="12" r="10" stroke-dasharray="3 2"/>
                  </svg>
                  <span>Bohr 2D</span>
                </button>
                <button class="viz-tab" data-viz="bohr3d" title="3D Electron Cloud">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                  </svg>
                  <span>e⁻ Cloud</span>
                </button>
                <button class="viz-tab" data-viz="orbital" title="Orbital Diagram">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="14" width="4" height="6" rx="1"/><rect x="7" y="10" width="4" height="10" rx="1"/><rect x="12" y="6" width="4" height="14" rx="1"/><rect x="17" y="2" width="4" height="18" rx="1"/>
                  </svg>
                  <span>Orbitals</span>
                </button>
                <button class="viz-tab" data-viz="molecule" title="Common Molecule">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><circle cx="18" cy="7" r="2"/><line x1="10.5" y1="9.5" x2="13.5" y2="14.5"/><line x1="15.5" y1="8.5" x2="10" y2="6.5"/>
                  </svg>
                  <span>Molecule</span>
                </button>
              </div>
              <div class="viz-container" id="viz-container">
                <div class="viz-panel active" id="viz-bohr2d"></div>
                <div class="viz-panel" id="viz-bohr3d"></div>
                <div class="viz-panel" id="viz-orbital"></div>
                <div class="viz-panel" id="viz-molecule"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- ═══════════════════════ Footer ═══════════════════════ -->
  <footer class="app-footer">
    <p>Interactive Periodic Table &mdash; Data based on IUPAC 2021 standard atomic weights</p>
  </footer>

  <script src="js/elements.js"></script>
  <script src="js/compounds.js"></script>
  <script src="js/compounds-extra.js"></script>
  <script src="js/ions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
