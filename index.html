<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Periodic Table of the Elements</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ═══════════════════════ Header ═══════════════════════ -->
  <header class="app-header">
    <div class="header-content">
      <h1>Periodic Table <span class="header-subtitle">of the Elements</span></h1>
      <div class="header-controls">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search elements..." autocomplete="off" aria-label="Search elements">
        </div>
        <div class="temp-control">
          <label for="temp-slider" class="temp-label">
            <span class="temp-value" id="temp-display">25°C</span>
            <span class="temp-caption">Temperature</span>
          </label>
          <input type="range" id="temp-slider" min="-273" max="6000" value="25" step="1" aria-label="Temperature slider">
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════ Main Content ═══════════════════════ -->
  <main class="app-main">
    <!-- Category Legend -->
    <div class="legend" id="legend"></div>

    <!-- Periodic Table Grid -->
    <div class="table-container">
      <div class="periodic-table" id="periodic-table">
        <!-- Elements are rendered by JS -->
      </div>

      <!-- Lanthanide / Actinide separator -->
      <div class="f-block-separator">
        <div class="f-block-row lanthanide-row" id="lanthanide-row-label">
          <span class="f-block-label">Lanthanides</span>
        </div>
        <div class="f-block-row actinide-row" id="actinide-row-label">
          <span class="f-block-label">Actinides</span>
        </div>
      </div>
    </div>

    <!-- Element Detail Modal -->
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <aside class="detail-panel" id="detail-panel" aria-live="polite">
      <div class="detail-content" id="detail-content">
        <button class="detail-close" id="detail-close" aria-label="Close detail panel">&times;</button>
        <div class="detail-layout">
          <!-- Left Column: Nuclear Physics -->
          <div class="detail-col-nuclear">
            <div class="nuclear-header">
              <h3>Nuclear Structure</h3>
              <div class="nuclear-info-row">
                <span class="nuclear-badge" id="nuclear-protons"></span>
                <span class="nuclear-badge" id="nuclear-neutrons"></span>
                <span class="nuclear-badge nuclear-radius-badge" id="nuclear-radius"></span>
              </div>
              <div class="nuclear-info-row">
                <span class="nuclear-stat" id="nuclear-spin"></span>
                <span class="nuclear-stat" id="nuclear-binding"></span>
                <span class="nuclear-stat" id="nuclear-magnetic"></span>
              </div>
              <div class="nuclear-info-row">
                <span class="nuclear-stat" id="nuclear-crosssection"></span>
                <span class="nuclear-stat" id="nuclear-separation"></span>
              </div>
              <div class="nuclear-stability" id="nuclear-stability"></div>
              <div class="nuclear-origin" id="nuclear-origin"></div>
              <div class="nuclear-analysis" id="nuclear-analysis"></div>
            </div>
            <div class="nuclear-viz-switcher">
              <button class="nuclear-viz-tab active" data-nviz="nucleus3d" title="3D Nucleus">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="9" cy="9" r="3" fill="#ff6b6b" stroke="none" opacity="0.8"/><circle cx="14" cy="10" r="3" fill="#4ecdc4" stroke="none" opacity="0.8"/><circle cx="11" cy="14" r="3" fill="#ff6b6b" stroke="none" opacity="0.8"/><circle cx="12" cy="7" r="3" fill="#4ecdc4" stroke="none" opacity="0.8"/>
                </svg>
                <span>Nucleus</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="decaychain" title="Decay Chain">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="4" r="2.5"/><circle cx="6" cy="14" r="2.5"/><circle cx="18" cy="14" r="2.5"/><circle cx="12" cy="21" r="2"/><line x1="12" y1="6.5" x2="6" y2="11.5"/><line x1="12" y1="6.5" x2="18" y2="11.5"/><line x1="6" y1="16.5" x2="12" y2="19"/>
                </svg>
                <span>Decay</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="binding" title="Binding Energy">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="2,20 6,14 10,10 14,6 18,4.5 22,4"/><circle cx="14" cy="6" r="2.5" fill="#ffd93d" stroke="none" opacity="0.7"/>
                </svg>
                <span>Binding</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="shells" title="Nuclear Shell Model">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="18" width="18" height="3" rx="1" fill="#4ecdc4" opacity="0.5"/><rect x="5" y="13" width="14" height="3" rx="1" fill="#ff6b6b" opacity="0.5"/><rect x="7" y="8" width="10" height="3" rx="1" fill="#ffd93d" opacity="0.5"/><rect x="9" y="3" width="6" height="3" rx="1" fill="#a78bfa" opacity="0.5"/>
                </svg>
                <span>Shells</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="nuclides" title="Chart of Nuclides">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="4" height="4" fill="#333" stroke="none" opacity="0.7"/><rect x="7" y="2" width="4" height="4" fill="#4a9eff" stroke="none" opacity="0.7"/><rect x="2" y="7" width="4" height="4" fill="#ff6b6b" stroke="none" opacity="0.7"/><rect x="7" y="7" width="4" height="4" fill="#333" stroke="none" opacity="0.7"/><rect x="12" y="7" width="4" height="4" fill="#4a9eff" stroke="none" opacity="0.7"/><rect x="7" y="12" width="4" height="4" fill="#ffd93d" stroke="none" opacity="0.7"/><rect x="12" y="12" width="4" height="4" fill="#333" stroke="none" opacity="0.7"/>
                </svg>
                <span>Nuclides</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="semf" title="Semi-Empirical Mass Formula">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="14" width="4" height="7" fill="#4ecdc4" stroke="none" opacity="0.7"/><rect x="8" y="10" width="4" height="11" fill="#ff6b6b" stroke="none" opacity="0.7"/><rect x="13" y="6" width="4" height="15" fill="#ffd93d" stroke="none" opacity="0.7"/><rect x="18" y="3" width="4" height="18" fill="#a78bfa" stroke="none" opacity="0.7"/>
                </svg>
                <span>SEMF</span>
              </button>
              <button class="nuclear-viz-tab" data-nviz="decaycurve" title="Half-Life Decay Curve">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3,4 6,4.5 9,6 12,9 15,14 18,18 21,20"/><line x1="3" y1="21" x2="21" y2="21" opacity="0.3"/><circle cx="9" cy="6" r="2" fill="#ff6b6b" stroke="none" opacity="0.7"/>
                </svg>
                <span>t½</span>
              </button>
            </div>
            <div class="nuclear-viz-container" id="nuclear-viz-container">
              <div class="nuclear-viz-panel active" id="nviz-nucleus3d"></div>
              <div class="nuclear-viz-panel" id="nviz-decaychain"></div>
              <div class="nuclear-viz-panel" id="nviz-binding"></div>
              <div class="nuclear-viz-panel" id="nviz-shells"></div>
              <div class="nuclear-viz-panel" id="nviz-nuclides"></div>
              <div class="nuclear-viz-panel" id="nviz-semf"></div>
              <div class="nuclear-viz-panel" id="nviz-decaycurve"></div>
            </div>
            <div class="nuclear-reactions" id="nuclear-reactions" style="display:none"></div>
            <div class="isotope-list" id="isotope-list"></div>
          </div>
          <!-- Center Column: Identity & Chemistry -->
          <div class="detail-col-left">
            <div class="detail-header">
              <div class="detail-symbol-block" id="detail-symbol-block">
                <span class="detail-number" id="detail-number"></span>
                <span class="detail-symbol" id="detail-symbol"></span>
                <span class="detail-name" id="detail-name"></span>
                <span class="detail-mass" id="detail-mass"></span>
              </div>
              <div class="detail-category-badge" id="detail-category"></div>
            </div>
            <p class="detail-summary" id="detail-summary"></p>
            <div class="detail-fun-fact" id="detail-fun-fact">
              <span class="fun-fact-label">Fun Fact</span>
              <p id="detail-fun-fact-text"></p>
            </div>
            <div class="detail-ions" id="detail-ions" style="display:none">
              <h3>Ionic States &amp; Oxidation</h3>
              <div class="oxidation-states" id="oxidation-states"></div>
              <div class="ions-list" id="ions-list"></div>
            </div>
            <div class="detail-properties">
              <h3>Properties</h3>
              <div class="properties-grid" id="properties-grid"></div>
            </div>
          </div>
          <!-- Right Column: Electron Visualizations -->
          <div class="detail-col-right">
            <div class="detail-shells">
              <h3>Electron Configuration</h3>
              <p class="electron-config-text" id="electron-config-text"></p>
              <div class="viz-switcher">
                <button class="viz-tab active" data-viz="bohr2d" title="2D Bohr Model">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 2"/><circle cx="12" cy="12" r="10" stroke-dasharray="3 2"/>
                  </svg>
                  <span>Bohr 2D</span>
                </button>
                <button class="viz-tab" data-viz="bohr3d" title="3D Electron Cloud">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                  </svg>
                  <span>e⁻ Cloud</span>
                </button>
                <button class="viz-tab" data-viz="orbital" title="Orbital Diagram">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="14" width="4" height="6" rx="1"/><rect x="7" y="10" width="4" height="10" rx="1"/><rect x="12" y="6" width="4" height="14" rx="1"/><rect x="17" y="2" width="4" height="18" rx="1"/>
                  </svg>
                  <span>Orbitals</span>
                </button>
                <button class="viz-tab" data-viz="molecule" title="Common Molecule">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><circle cx="18" cy="7" r="2"/><line x1="10.5" y1="9.5" x2="13.5" y2="14.5"/><line x1="15.5" y1="8.5" x2="10" y2="6.5"/>
                  </svg>
                  <span>Molecule</span>
                </button>
              </div>
              <div class="viz-container" id="viz-container">
                <div class="viz-panel active" id="viz-bohr2d"></div>
                <div class="viz-panel" id="viz-bohr3d"></div>
                <div class="viz-panel" id="viz-orbital"></div>
                <div class="viz-panel" id="viz-molecule"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- ═══════════════════════ Footer ═══════════════════════ -->
  <footer class="app-footer">
    <p>Interactive Periodic Table &mdash; Data based on IUPAC 2021 standard atomic weights</p>
  </footer>

  <script src="js/elements.js"></script>
  <script src="js/compounds.js"></script>
  <script src="js/compounds-extra.js"></script>
  <script src="js/ions.js"></script>
  <script src="js/molecular-orbitals.js"></script>
  <script src="js/nuclear-data.js"></script>
  <script src="js/nuclear-extra.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
